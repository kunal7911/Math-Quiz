<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NC 4th Grade Math Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .content { padding: 40px 20px; }
        .home-view { display: block; }
        .quiz-view { display: none; }
        .results-view { display: none; }
        .weeks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .week-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .week-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .week-card h3 { font-size: 1.3em; margin-bottom: 10px; }
        .week-card p { font-size: 0.95em; opacity: 0.9; }
        .progress-bar {
            background: #e0e0e0;
            height: 10px;
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
        }
        .question-container { margin-bottom: 30px; }
        .question-text {
            font-size: 1.3em;
            font-weight: 500;
            color: #333;
            margin-bottom: 20px;
        }
        .question-counter { color: #999; font-size: 0.9em; margin-bottom: 10px; }
        .options { display: grid; gap: 15px; }
        .option input[type="radio"] { display: none; }
        .option label {
            display: block;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            font-size: 1.05em;
        }
        .option input[type="radio"]:checked + label {
            background: #667eea;
            color: white;
            border-color: #764ba2;
        }
        .option label:hover { background: #e8e8e8; }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }
        button {
            padding: 15px 30px;
            font-size: 1.05em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #d0d0d0; }
        .results-score { text-align: center; margin: 30px 0; }
        .score-display {
            font-size: 2.5em;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }
        .message { font-size: 1.3em; color: #333; margin: 20px 0; }
        .results-list {
            margin-top: 30px;
            max-height: 400px;
            overflow-y: auto;
        }
        .result-item {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid #999;
        }
        .result-item.correct {
            border-left-color: #4caf50;
            background: #f1f8f5;
        }
        .result-item.incorrect {
            border-left-color: #f44336;
            background: #fef5f5;
        }
        .result-question { font-weight: 600; margin-bottom: 10px; color: #333; }
        .result-answer { font-size: 0.95em; margin: 5px 0; }
        .result-answer.user { color: #f44336; }
        .result-answer.correct { color: #4caf50; }
        .mark { margin-right: 10px; }
        .mark.correct { color: #4caf50; }
        .mark.incorrect { color: #f44336; }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8em; }
            .weeks-grid { grid-template-columns: 1fr; }
            button { width: 100%; }
        }
    </style>
</head>

        let currentWeek = null, currentQuestion = 0, score = 0, answers = [];
        function initializeApp() { renderWeeks(); }
        function renderWeeks() {
            const grid = document.getElementById('weeksGrid');
            grid.innerHTML = '';
            quizData.forEach(week => {
                const card = document.createElement('div');
                card.className = 'week-card';
                card.onclick = () => startQuiz(week.week);
                card.innerHTML = `<h3>Week ${week.week}</h3><p>${week.topic}</p><p style="margin-top: 10px; font-size: 0.9em; opacity: 0.8;">25 Questions</p>`;
                grid.appendChild(card);
            });
        }
        function startQuiz(weekNum) {
            currentWeek = quizData[weekNum - 1];
            currentQuestion = 0;
            score = 0;
            answers = [];
            showQuizView();
            renderQuestion();
        }
        function renderQuestion() {
            const question = currentWeek.questions[currentQuestion];
            document.getElementById('questionCounter').textContent = `Question ${currentQuestion + 1} of ${currentWeek.questions.length}`;
            document.getElementById('weekDisplay').textContent = `Week ${currentWeek.week}: ${currentWeek.topic}`;
            document.getElementById('questionText').textContent = question.q;
            const progress = ((currentQuestion + 1) / currentWeek.questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            question.o.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                const id = 'option' + index;
                optionDiv.innerHTML = `<input type="radio" id="${id}" name="answer" value="${index}"><label for="${id}">${option}</label>`;
                optionsContainer.appendChild(optionDiv);
            });
            const selectedAnswer = answers[currentQuestion];
            if (selectedAnswer !== undefined) {
                document.querySelector(`input[value="${selectedAnswer}"]`).checked = true;
            }
        }
        function nextQuestion() {
            const selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) {
                alert('Please select an answer!');
                return;
            }
            const answerIndex = parseInt(selected.value);
            answers[currentQuestion] = answerIndex;
            const question = currentWeek.questions[currentQuestion];
            if (answerIndex === question.a) { score++; }
            currentQuestion++;
            if (currentQuestion < currentWeek.questions.length) {
                renderQuestion();
            } else {
                showResultsView();
            }
        }
        function showQuizView() {
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('quizView').style.display = 'block';
            document.getElementById('resultsView').style.display = 'none';
        }
        function showResultsView() {
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('quizView').style.display = 'none';
            document.getElementById('resultsView').style.display = 'block';
            renderResults();
        }
        function renderResults() {
            const totalQuestions = currentWeek.questions.length;
            const percentage = Math.round((score / totalQuestions) * 100);
            document.getElementById('scoreDisplay').textContent = `${score}/${totalQuestions}`;
            let message = '';
            if (percentage === 100) message = "Perfect Score! You're a Math Star!";
            else if (percentage >= 90) message = "Excellent! Keep up the great work!";
            else if (percentage >= 80) message = "Very Good! You're doing great!";
            else if (percentage >= 70) message = "Good Job! Practice makes perfect!";
            else if (percentage >= 60) message = "Nice Try! Keep practicing!";
            else message = "Keep Trying! You'll improve with practice!";
            document.getElementById('messageDisplay').textContent = message;
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '<h3 style="margin-bottom: 20px;">Review Your Answers</h3>';
            currentWeek.questions.forEach((question, index) => {
                const userAnswer = answers[index];
                const correctAnswer = question.a;
                const isCorrect = userAnswer === correctAnswer;
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item ' + (isCorrect ? 'correct' : 'incorrect');
                const mark = isCorrect ? '✓' : '✗';
                const markClass = isCorrect ? 'correct' : 'incorrect';
                resultItem.innerHTML = `
                    <div class="result-question"><span class="mark ${markClass}">${mark}</span>Q${index + 1}: ${question.q}</div>
                    <div class="result-answer user">Your answer: ${question.o[userAnswer] || 'Not answered'}</div>
                    ${!isCorrect ? `<div class="result-answer correct">Correct answer: ${question.o[correctAnswer]}</div>` : ''}
                `;
                resultsList.appendChild(resultItem);
            });
        }
        function goHome() {
            document.getElementById('homeView').style.display = 'block';
            document.getElementById('quizView').style.display = 'none';
            document.getElementById('resultsView').style.display = 'none';
